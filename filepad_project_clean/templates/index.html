<body>
<div class="container">
    <div class="header">
        <h1>🔐 FilePad</h1>
        <p>Secure Cloud Storage</p>
    </div>

    <div class="content">
        <!-- LOGIN -->
        <div class="login-section active">
            <div id="loginError"></div>
            <div class="input-group">
                <label>Enter Your Password</label>
                <input type="password" id="password" placeholder="4-32 characters" minlength="4" maxlength="32">
            </div>
            <button class="btn" id="loginBtn">Access FilePad Anywhere</button>
        </div>

        <!-- FILEPAD -->
        <div class="filepad-section">
            <div id="filepadMessage"></div>

            <div class="user-info">
                <div>🔐 <strong>Logged in securely</strong></div>
                <button class="btn-secondary" id="logoutBtn">Logout</button>
            </div>

            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">☁️</div>
                <h3>Click to Upload Files</h3>
                <p style="color:#6c757d;">Max 100MB • 5 files max</p>
            </div>

            <input type="file" id="fileInput" multiple style="display:none;">

            <div class="file-list">
                <h3>Your Files</h3>
                <div id="files"></div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL -->
<div id="confirmModal">
    <div class="box">
        <p id="confirmText"></p>
        <div style="margin-top:20px; display:flex; justify-content:space-between;">
            <button class="btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn-danger" onclick="confirmDelete()">Delete</button>
        </div>
    </div>
</div>

<script>
const API = window.location.origin + '/api';
let pwd = null, files = [], deleteId = null;

document.getElementById('loginBtn').onclick = login;
document.getElementById('password').addEventListener('keypress', e => { if(e.key==='Enter') login(); });
document.getElementById('uploadArea').onclick = () => fileInput.click();
document.getElementById('fileInput').onchange = upload;
document.getElementById('logoutBtn').onclick = logout;

async function login(){
    const p = password.value;
    if(!p || p.length<4 || p.length>32){
        showMsg('loginError','Invalid password','error'); return;
    }
    const r = await fetch(`${API}/auth/`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({password:p})
    });
    const d = await r.json();
    if(r.ok){
        pwd=p;
        document.querySelector('.login-section').classList.remove('active');
        document.querySelector('.filepad-section').classList.add('active');
        loadFiles();
    }else showMsg('loginError',d.error,'error');
}

async function loadFiles(){
    const r = await fetch(`${API}/files/?password=${pwd}`);
    const d = await r.json();
    if(r.ok){ files=d.files; showFiles(); }
}

async function upload(){
    const list = fileInput.files;
    for(let f of list){
        if(f.size>104857600){ showMsg('filepadMessage','File too large','error'); continue; }

        const fd=new FormData();
        fd.append('file',f);
        fd.append('password',pwd);

        const r=await fetch(`${API}/upload/`,{method:'POST',body:fd});
        const d=await r.json();

        if(r.ok){
            showMsg('filepadMessage',`✓ ${f.name} uploaded`,'success');
        }else{
            showMsg('filepadMessage',d.error,'error');
        }
    }
    fileInput.value='';
    loadFiles();
}

function showFiles(){
    const c = document.getElementById('files');

    if(!files.length){
        c.innerHTML='<div class="empty-state">No files</div>';
        return;
    }

    let html = `<p style="color:#6c757d;">📊 ${files.length} / 5 files used</p>`;

    html += files.map(f=>`
        <div class="file-item">
            <div>${f.original_filename}</div>
            <div>
                <button class="btn-download" onclick="download(${f.id})">Download</button>
                <button class="btn-danger" onclick="del(${f.id})">Delete</button>
            </div>
        </div>
    `).join('');

    c.innerHTML = html;
}

function download(id){
    window.open(`${API}/files/${id}/download/?password=${pwd}`);
}

function del(id){
    deleteId=id;
    confirmText.innerText="Delete this file?";
    confirmModal.style.display='flex';
}

function closeModal(){
    confirmModal.style.display='none';
}

async function confirmDelete(){
    const r = await fetch(`${API}/files/${deleteId}/delete/?password=${pwd}`,{method:'DELETE'});
    if(r.ok){ showMsg('filepadMessage','Deleted','success'); loadFiles(); }
    closeModal();
}

function logout(){
    pwd=null;
    files=[];
    location.reload();
}

function showMsg(id,msg,type){
    document.getElementById(id).innerHTML=`<div class="${type}">${msg}</div>`;
}
</script>
</body>
</html>
